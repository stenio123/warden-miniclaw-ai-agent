<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warden · MiniClaw</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d1117;
    --bg-card:     #161b22;
    --bg-input:    #0d1117;
    --border:      #30363d;
    --border-hi:   #484f58;
    --text:        #c9d1d9;
    --text-muted:  #8b949e;
    --blue:        #58a6ff;
    --green:       #3fb950;
    --yellow:      #d29922;
    --red:         #f85149;
    --purple:      #bc8cff;
    --orange:      #e3b341;
    --temporal:    #424FF5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Header ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

  .logo {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: -0.2px;
  }
  .logo .sep { color: var(--blue); }
  .logo .sub { color: var(--text-muted); font-weight: 400; }

  #current-goal-label {
    color: var(--text-muted);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 360px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ─── Badge ──────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.3s, color 0.3s;
  }
  .badge::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .badge-idle                    { background: #1c2128; color: var(--text-muted); }
  .badge-working                 { background: #1a3a5c; color: var(--blue);   animation: blink 1.5s ease-in-out infinite; }
  .badge-awaiting_tool_approval  { background: #332701; color: var(--yellow); animation: blink 1.5s ease-in-out infinite; }

  @keyframes blink { 0%,100%{opacity:.65} 50%{opacity:1} }

  /* ─── Layout ─────────────────────────────────── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    min-height: 0;
    overflow: hidden;
  }

  /* ─── Left column ────────────────────────────── */
  .left-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 14px 8px 14px 16px;
    min-height: 0;
    overflow: hidden;
  }

  /* ─── Right column ───────────────────────────── */
  .right-col {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* ─── Cards (left column) ────────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    flex-shrink: 0;
    overflow: hidden;
  }

  #log-card {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px 7px;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  /* ─── Last Result ────────────────────────────── */
  #result-body {
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 220px;
    overflow-y: auto;
  }

  .empty-hint { color: var(--text-muted); font-style: italic; }

  .processing-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-style: italic;
  }

  .spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(88,166,255,.25);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .75s linear infinite;
    flex-shrink: 0;
  }
  .spinner-yellow {
    border-color: rgba(210,153,34,.25);
    border-top-color: var(--yellow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Tool Approval ──────────────────────────── */
  #approval-card {
    display: none;
    border-left: 3px solid var(--yellow);
  }
  #approval-card.visible {
    display: block;
    animation: slideDown .25s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: none; }
  }

  .approval-body { padding: 12px 14px; }

  .approval-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .approval-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .approval-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .approval-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 11px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    overflow-y: auto;
    max-height: 140px;
    white-space: pre;
    margin-bottom: 10px;
  }
  .approval-verdict {
    background: rgba(88,166,255,.07);
    border-left: 3px solid var(--blue);
    border-radius: 0 4px 4px 0;
    padding: 7px 10px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .approval-actions { display: flex; gap: 8px; }

  #deny-form { margin-top: 10px; display: none; }
  #deny-form textarea { margin-bottom: 8px; }
  #deny-form .row { display: flex; gap: 8px; }

  /* ─── Activity Log ───────────────────────────── */
  .log-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #log-entries {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .log-entry {
    font-size: 12.5px;
    line-height: 1.55;
    padding: 5px 9px;
    border-radius: 4px;
    border-left: 2px solid transparent;
    animation: fadeIn .3s ease;
    white-space: pre-wrap;
    word-break: break-word;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: none; }
  }
  .log-ts {
    font-size: 10.5px;
    color: var(--text-muted);
    font-family: 'SF Mono', monospace;
    margin-bottom: 2px;
  }

  .log-agent   { border-left-color: var(--blue);   background: rgba(88,166,255,.05); }
  .log-user    { border-left-color: var(--green);  background: rgba(63,185,80,.05); }
  .log-system  { border-left-color: var(--purple); background: rgba(188,140,255,.05); }
  .log-tool    { border-left-color: var(--orange); background: rgba(227,179,65,.05); }
  .log-reject  { border-left-color: var(--red);    background: rgba(248,81,73,.05); }
  .log-neutral { color: var(--text-muted); }

  #scroll-btn {
    display: none;
    font-size: 11px;
    padding: 2px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
  }
  #scroll-btn:hover { border-color: var(--border-hi); color: var(--text); }

  /* ─── Right column sections ──────────────────── */
  .rc-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .rc-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    margin-bottom: 9px;
  }

  textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    resize: none;
    line-height: 1.5;
    transition: border-color .15s;
    outline: none;
  }
  textarea:focus { border-color: var(--blue); }
  textarea::placeholder { color: var(--text-muted); }

  /* ─── Buttons ────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .15s, border-color .15s, transform .1s;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }

  .btn-primary  { background: #1f6feb; border-color: #388bfd; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #388bfd; }

  .btn-secondary { background: #21262d; border-color: var(--border); color: var(--text); }
  .btn-secondary:hover:not(:disabled) { background: #30363d; border-color: var(--border-hi); }

  .btn-success  { background: rgba(63,185,80,.15); border-color: var(--green); color: var(--green); }
  .btn-success:hover:not(:disabled) { background: rgba(63,185,80,.25); }

  .btn-danger   { background: rgba(248,81,73,.15); border-color: var(--red); color: var(--red); }
  .btn-danger:hover:not(:disabled)  { background: rgba(248,81,73,.25); }

  .btn-sm { padding: 3px 9px; font-size: 12px; }

  .goal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .goal-hint { font-size: 11px; color: var(--text-muted); }

  /* ─── Toolbox ────────────────────────────────── */
  .tool-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 12.5px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-bottom: 5px;
  }
  .tool-name { display: flex; align-items: center; gap: 7px; }
  .tool-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .tool-empty { color: var(--text-muted); font-style: italic; font-size: 13px; font-family: inherit; }

  /* ─── Memory viewer ──────────────────────────── */
  .memory-toggle-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .memory-toggle-btn:hover { color: var(--text); }

  #memory-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height .3s ease;
  }
  #memory-body.open { max-height: 360px; }

  #memory-content {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    color: var(--text-muted);
    overflow-y: auto;
    max-height: 340px;
  }

  /* ─── Footer ─────────────────────────────────── */
  footer {
    flex-shrink: 0;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  footer a {
    color: var(--temporal);
    text-decoration: none;
    font-weight: 500;
  }
  footer a:hover { text-decoration: underline; }
  footer .sep { opacity: .4; }

  /* ─── Scrollbars ─────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
</style>
</head>
<body>

<!-- ─── Header ───────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="logo">Warden<span class="sep"> · </span><span class="sub">MiniClaw</span></span>
    <span id="status-badge" class="badge badge-idle">idle</span>
    <span id="current-goal-label"></span>
  </div>
  <div class="header-right">
    <span id="goals-count">0 goals processed</span>
    <span id="queue-label" style="display:none; color:var(--yellow);"></span>
  </div>
</header>

<!-- ─── Main ─────────────────────────────────────── -->
<main>

  <!-- Left column -->
  <div class="left-col">

    <!-- Last Result -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Last Result</span>
      </div>
      <div id="result-body">
        <span class="empty-hint">Send a goal to get started.</span>
      </div>
    </div>

    <!-- Tool Approval (hidden until pending) -->
    <div class="card" id="approval-card">
      <div class="card-header">
        <span class="card-title" style="color:var(--yellow);">⚠ Tool Approval Required</span>
      </div>
      <div class="approval-body">
        <div class="approval-name" id="approval-tool-name"></div>
        <div class="approval-desc" id="approval-desc"></div>
        <div class="approval-label">Proposed Code</div>
        <div class="approval-code" id="approval-code"></div>
        <div class="approval-label">Safety Review</div>
        <div class="approval-verdict" id="approval-verdict"></div>
        <div class="approval-actions">
          <button class="btn btn-success" onclick="doApprove(true)">✓ Approve</button>
          <button class="btn btn-danger"  onclick="showDenyForm()">✗ Deny</button>
        </div>
        <div id="deny-form">
          <textarea id="deny-reason" rows="2" placeholder="Reason for denial (sent back to agent)…"></textarea>
          <div class="row">
            <button class="btn btn-danger"    onclick="doApprove(false)">Confirm Deny</button>
            <button class="btn btn-secondary" onclick="hideDenyForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="card" id="log-card">
      <div class="card-header">
        <span class="card-title">Activity Log</span>
        <div class="log-header-right">
          <button id="scroll-btn" onclick="enableAutoScroll()">↓ latest</button>
        </div>
      </div>
      <div id="log-entries"></div>
    </div>

  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- Send Goal -->
    <div class="rc-section">
      <div class="rc-title">Send Goal</div>
      <textarea id="goal-input" rows="3" placeholder="What should Warden do?"></textarea>
      <div class="goal-row">
        <button id="goal-btn" class="btn btn-primary" onclick="sendGoal()">Send Goal</button>
        <span class="goal-hint">Ctrl+Enter to send</span>
      </div>
    </div>

    <!-- Teach the Agent -->
    <div class="rc-section">
      <div class="rc-title">Teach the Agent</div>
      <textarea id="teach-input" rows="2" placeholder="e.g. User prefers concise bullet points…"></textarea>
      <div style="margin-top:8px;">
        <button id="teach-btn" class="btn btn-secondary" onclick="teach()">Save to Memory</button>
      </div>
    </div>

    <!-- Toolbox -->
    <div class="rc-section">
      <div class="rc-title">Toolbox</div>
      <div id="toolbox-list">
        <span class="tool-empty">No tools approved yet.</span>
      </div>
    </div>

    <!-- Memory Viewer (collapsible) -->
    <div class="rc-section" style="border-bottom:none; flex:1; min-height:0;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="rc-title" style="margin-bottom:0;">MEMORY.md</div>
        <button class="memory-toggle-btn" id="memory-toggle-btn" onclick="toggleMemory()">▶ show</button>
      </div>
      <div id="memory-body">
        <div id="memory-content"></div>
      </div>
    </div>

  </div>
</main>

<!-- ─── Footer ───────────────────────────────────── -->
<footer>
  Durability powered by
  <a href="https://temporal.io" target="_blank" rel="noopener">Temporal</a>
  <span class="sep">·</span>
  MiniClaw memory system
</footer>

<script>
// ── State ──────────────────────────────────────────
let prevLogText  = '';
let autoScroll   = true;
let memoryOpen   = false;
let pendingChildId = null;

// ── Polling ────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) return;
    const data = await res.json();
    render(data);
  } catch (_) {}
}
setInterval(poll, 2000);
poll();

// ── Render ─────────────────────────────────────────
function render(d) {
  renderHeader(d);
  renderResult(d);
  renderApproval(d);
  renderLog(d);
  renderToolbox(d);
  renderMemory(d);
}

// ── Header ─────────────────────────────────────────
function renderHeader(d) {
  const s = d.status || 'idle';
  const badge = document.getElementById('status-badge');
  badge.textContent = s.replace(/_/g, ' ');
  badge.className = 'badge badge-' + s;

  const gl = document.getElementById('current-goal-label');
  if (d.current_goal) {
    const g = d.current_goal;
    gl.textContent = '→ ' + g.substring(0, 60) + (g.length > 60 ? '…' : '');
  } else {
    gl.textContent = '';
  }

  document.getElementById('goals-count').textContent =
    (d.goals_processed || 0) + ' goals processed';

  const ql = document.getElementById('queue-label');
  if (d.queue_depth > 0) {
    ql.textContent = d.queue_depth + ' queued';
    ql.style.display = 'inline';
  } else {
    ql.style.display = 'none';
  }
}

// ── Last Result ────────────────────────────────────
function renderResult(d) {
  const el = document.getElementById('result-body');
  const s = d.status || 'idle';

  if (s === 'working') {
    const excerpt = d.current_goal
      ? esc(d.current_goal.substring(0, 90)) + (d.current_goal.length > 90 ? '…' : '')
      : 'Processing…';
    el.innerHTML =
      `<div class="processing-row" style="color:var(--blue)">` +
      `<div class="spinner"></div>Working on: ${excerpt}</div>`;

  } else if (s === 'awaiting_tool_approval') {
    el.innerHTML =
      `<div class="processing-row" style="color:var(--yellow)">` +
      `<div class="spinner spinner-yellow"></div>Awaiting tool approval…</div>`;

  } else if (d.last_result) {
    el.innerHTML =
      `<div style="white-space:pre-wrap;word-break:break-word;line-height:1.65;">` +
      esc(d.last_result) + `</div>`;

  } else {
    el.innerHTML = `<span class="empty-hint">Send a goal to get started.</span>`;
  }
}

// ── Tool Approval ──────────────────────────────────
function renderApproval(d) {
  const card = document.getElementById('approval-card');
  const ap = d.pending_approval;

  if (ap && ap.waiting) {
    pendingChildId = d.pending_child_id;
    document.getElementById('approval-tool-name').textContent = ap.tool_name || '';
    document.getElementById('approval-desc').textContent      = ap.proposal   || '';
    document.getElementById('approval-code').textContent      = ap.tool_code  || '';
    document.getElementById('approval-verdict').textContent   = ap.llm_verdict || '';
    card.classList.add('visible');
  } else {
    card.classList.remove('visible');
    document.getElementById('deny-form').style.display = 'none';
    pendingChildId = null;
  }
}

function showDenyForm() { document.getElementById('deny-form').style.display = 'block'; }
function hideDenyForm()  { document.getElementById('deny-form').style.display = 'none'; }

async function doApprove(approved) {
  if (!pendingChildId) return;
  let reason = '';
  if (!approved) {
    reason = document.getElementById('deny-reason').value.trim();
    if (!reason) { alert('Please provide a reason for denial.'); return; }
  }
  await fetch('/api/tool-approval', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ child_id: pendingChildId, approved, reason }),
  });
  hideDenyForm();
  setTimeout(poll, 400);
}

// ── Activity Log ───────────────────────────────────
function renderLog(d) {
  const log = d.session_log || '';
  if (log === prevLogText) return;
  prevLogText = log;

  const container = document.getElementById('log-entries');
  const entries = parseLog(log);

  container.innerHTML = '';
  for (const e of entries) {
    const div = document.createElement('div');
    div.className = 'log-entry ' + classifyLog(e.content);
    div.innerHTML =
      `<div class="log-ts">${esc(e.timestamp)}</div>` +
      esc(e.content);
    container.appendChild(div);
  }

  if (autoScroll) scrollToBottom();
}

function parseLog(log) {
  // Split on <!-- YYYY-MM-DD HH:MM --> markers
  const parts = log.split(/\n?<!-- ([^>]+) -->\n?/);
  const out = [];
  for (let i = 1; i < parts.length; i += 2) {
    const ts      = (parts[i]     || '').trim();
    const content = (parts[i + 1] || '').trim();
    if (content) out.push({ timestamp: ts, content });
  }
  return out;
}

function classifyLog(content) {
  if (content.includes('[USER]'))   return 'log-user';
  if (content.includes('[SYSTEM]')) return 'log-system';
  const toolEvent = content.includes('approved') || content.includes('rejected') ||
                    content.includes('Proposing tool') || content.includes('denied');
  if (content.includes('[AGENT]') && toolEvent) return 'log-tool';
  if (toolEvent && !content.includes('[AGENT]')) return 'log-reject';
  if (content.includes('[AGENT]')) return 'log-agent';
  return 'log-neutral';
}

// ── Auto-scroll ────────────────────────────────────
function scrollToBottom() {
  const el = document.getElementById('log-entries');
  el.scrollTop = el.scrollHeight;
  autoScroll = true;
  document.getElementById('scroll-btn').style.display = 'none';
}
function enableAutoScroll() { scrollToBottom(); }

document.getElementById('log-entries').addEventListener('scroll', function () {
  const atBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 50;
  autoScroll = atBottom;
  document.getElementById('scroll-btn').style.display = atBottom ? 'none' : 'inline-block';
});

// ── Toolbox ────────────────────────────────────────
function renderToolbox(d) {
  const el    = document.getElementById('toolbox-list');
  const tools = d.active_tools || [];
  if (tools.length === 0) {
    el.innerHTML = '<span class="tool-empty">No tools approved yet.</span>';
    return;
  }
  el.innerHTML = tools.map(t =>
    `<div class="tool-item">` +
    `<span class="tool-name"><span class="tool-dot"></span>${esc(t)}</span>` +
    `<button class="btn btn-secondary btn-sm" data-tool="${esc(t)}" onclick="revokeTool(this.dataset.tool)">Revoke</button>` +
    `</div>`
  ).join('');
}

async function revokeTool(name) {
  if (!confirm(`Revoke tool "${name}"?\nThe agent will no longer be able to use it.`)) return;
  await fetch('/api/deny-tool', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tool_name: name }),
  });
  poll();
}

// ── Memory Viewer ──────────────────────────────────
function renderMemory(d) {
  document.getElementById('memory-content').textContent = d.memory_md || '(empty)';
}

function toggleMemory() {
  memoryOpen = !memoryOpen;
  document.getElementById('memory-body').classList.toggle('open', memoryOpen);
  document.getElementById('memory-toggle-btn').textContent = memoryOpen ? '▼ hide' : '▶ show';
}

// ── Send Goal ──────────────────────────────────────
async function sendGoal() {
  const input = document.getElementById('goal-input');
  const btn   = document.getElementById('goal-btn');
  const goal  = input.value.trim();
  if (!goal) return;

  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    await fetch('/api/goal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }),
    });
    input.value = '';
  } catch (_) {}

  setTimeout(() => {
    btn.textContent = 'Send Goal';
    btn.disabled = false;
  }, 400);
  setTimeout(poll, 350);
}

document.getElementById('goal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendGoal(); }
});

// ── Teach the Agent ────────────────────────────────
async function teach() {
  const input = document.getElementById('teach-input');
  const btn   = document.getElementById('teach-btn');
  const content = input.value.trim();
  if (!content) return;

  btn.disabled = true;
  try {
    await fetch('/api/teach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    input.value = '';
    btn.textContent = '✓ Saved';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => {
      btn.textContent = 'Save to Memory';
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.disabled = false;
    }, 1500);
  } catch (_) {
    btn.disabled = false;
  }
}

document.getElementById('teach-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); teach(); }
});

// ── Utils ──────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
